
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PetCare+</title>
<meta name="description" content="Cuide do seu pet: vacinas, banho/tosa, alimentação e lembretes em um só app.">
<meta name="theme-color" content="#0EA5E9">

<!-- PWA: manifest e ícones -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- iOS: comportamento de app standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PetCare+">

<!-- Android / outros: comportamento de app standalone -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="PetCare+">
<meta name="format-detection" content="telephone=no">
<style>
*{box-sizing:border-box} body{margin:0;background:#eef4f8;font-family:Inter,Arial,sans-serif;color:#0f172a} .app{max-width:430px;margin:0 auto;min-height:100vh;background:#f8fafc;box-shadow:0 0 35px #0001;position:relative;padding-bottom:82px}.center{display:flex;align-items:center;justify-content:center}.p{padding:22px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#0ea5e9,#10b981);color:white;font-size:28px;box-shadow:0 12px 25px #0ea5e955}.brand{font-weight:900;font-size:22px}.brand span{color:#f97316}.card{background:white;border:1px solid #e2e8f0;border-radius:24px;padding:18px;box-shadow:0 8px 22px #0f172a0a}.btn{width:100%;border:0;border-radius:18px;padding:15px 18px;font-weight:800;font-size:15px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;box-shadow:0 10px 18px #0ea5e933;cursor:pointer}.btn.secondary{background:white;color:#0f172a;border:1px solid #dbe3ea;box-shadow:none}.btn.orange{background:linear-gradient(135deg,#f97316,#ea580c)}.btn.purple{background:linear-gradient(135deg,#8b5cf6,#6366f1);box-shadow:0 10px 18px #8b5cf633}input,select,textarea{width:100%;border:1px solid #dbe3ea;border-radius:16px;padding:14px;font-size:15px;outline:none;background:white}label{font-size:13px;font-weight:800;color:#475569;display:block;margin:14px 0 6px}.hero{text-align:center;padding:45px 25px 25px}.petimg{width:155px;height:155px;border-radius:38px;object-fit:cover;box-shadow:0 18px 35px #0f172a22;border:8px solid #fff}.grad{background:linear-gradient(135deg,#0ea5e9,#10b981);color:white;border-radius:28px;padding:22px;overflow:hidden}.grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.small{font-size:12px;color:#64748b}.muted{color:#64748b}.top{position:sticky;top:0;z-index:2;background:#ffffffd9;backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;padding:14px 18px;display:flex;gap:10px;align-items:center}.back{width:36px;height:36px;border:0;border-radius:50%;background:#f1f5f9;font-size:20px}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:white;border-top:1px solid #e2e8f0;display:grid;grid-template-columns:repeat(6,1fr);padding:8px 2px}.nav button{border:0;background:white;color:#64748b;font-size:10px;font-weight:800;padding:6px 2px;line-height:1.2}.nav .active{color:#0ea5e9}.icon{font-size:22px;display:block;margin-bottom:2px}.pill{display:inline-block;border-radius:999px;background:#e0f2fe;color:#0369a1;font-size:11px;font-weight:900;padding:6px 10px}.list{display:flex;flex-direction:column;gap:10px}.row{display:flex;gap:12px;align-items:center;background:white;border:1px solid #e2e8f0;border-radius:18px;padding:14px}.avatar{width:62px;height:62px;border-radius:20px;object-fit:cover}.hidden{display:none!important}.alert{background:#ecfdf5;color:#047857;border:1px solid #bbf7d0;border-radius:18px;padding:14px;font-weight:700}.alert.warn{background:#fffbeb;color:#b45309;border-color:#fde68a}.alert.danger{background:#fef2f2;color:#b91c1c;border-color:#fecaca}.danger{color:#dc2626}.recipe{height:105px;display:flex;overflow:hidden;padding:0}.recipe img{width:120px;object-fit:cover}.footerSpace{height:20px}.modal{position:fixed;inset:0;background:#0008;z-index:9;display:flex;align-items:flex-end}.sheet{background:white;border-radius:28px 28px 0 0;padding:22px;width:100%;max-width:430px;margin:0 auto;max-height:90vh;overflow:auto}.x{float:right;border:0;background:#f1f5f9;border-radius:50%;width:34px;height:34px;font-size:18px}.empty{text-align:center;padding:38px 20px;color:#64748b}.install li{margin:10px 0;line-height:1.45}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.tabs button{border:1px solid #dbe3ea;border-radius:14px;background:white;padding:12px;font-weight:800}.tabs .on{background:#0ea5e9;color:white;border-color:#0ea5e9}.statCard{background:white;border:1px solid #e2e8f0;border-radius:20px;padding:14px}.statCard .small{margin-bottom:6px}.statCard b{font-size:18px;display:block}.gIcon{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,#8b5cf6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;color:white}@media(min-width:800px){body{background:#e5edf3}.app{margin-top:0}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const $=s=>document.querySelector(s); const app=$('#app');
const K='petcare_plus_puro_v1';
const photo='https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=500&q=80';
let state=JSON.parse(localStorage.getItem(K)||'null')||{email:'',plan:'basic',pets:[],active:null,vaccines:[],reminders:[],grooming:[]};
if(!state.grooming)state.grooming=[];
function save(){localStorage.setItem(K,JSON.stringify(state))}
function id(){return Math.random().toString(36).slice(2,9)}
function fmt(d){return d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR'): '—'}
function days(d){
  if(!d)return NaN;
  const today=new Date();today.setHours(0,0,0,0);
  const target=new Date(d+'T00:00:00');target.setHours(0,0,0,0);
  const diff=target.getTime()-today.getTime();
  if(diff===0)return 0;
  return diff>0?Math.ceil(diff/86400000):Math.floor(diff/86400000);
}
function money(v){return 'R$ '+(parseFloat(v)||0).toFixed(2).replace('.',',')}
function pet(){return state.pets.find(p=>p.id===state.active)||state.pets[0]}
function logo(){return `<div class="logo center">🐾</div>`}
function nav(active){return `<div class="nav"><button class="${active==='home'?'active':''}" onclick="home()"><span class="icon">🏠</span>Início</button><button class="${active==='vac'?'active':''}" onclick="vaccines()"><span class="icon">💉</span>Vacinas</button><button class="${active==='groom'?'active':''}" onclick="grooming()"><span class="icon">🛁</span>Banho</button><button class="${active==='food'?'active':''}" onclick="food()"><span class="icon">🍽️</span>Comida</button><button class="${active==='rem'?'active':''}" onclick="reminders()"><span class="icon">🔔</span>Lembretes</button><button class="${active==='set'?'active':''}" onclick="settings()"><span class="icon">⚙️</span>Mais</button></div>`}
function topbar(t,back='home()'){return `<div class="top"><button class="back" onclick="${back}">‹</button><b style="font-size:18px">${t}</b></div>`}
function login(){app.innerHTML=`<div class="hero">${logo()}<div class="brand" style="margin-top:10px">PetCare<span>+</span></div><img class="petimg" style="margin:35px auto 20px" src="${photo}"><p class="pill">Acesso exclusivo</p><h1>Área exclusiva para assinantes PetCare+</h1><p class="muted">Digite o e-mail usado na compra para acessar seu aplicativo.</p><div class="card" style="text-align:left;margin-top:20px"><label>E-mail de compra</label><input id="email" type="email" placeholder="seu@email.com"><br><br><button class="btn" onclick="doLogin()">Acessar aplicativo</button><br><br><button class="btn secondary" onclick="install()">Como instalar no celular</button></div></div>`}
function doLogin(){let e=$('#email').value.trim().toLowerCase(); if(!e.includes('@')) return alert('Digite um e-mail válido'); state.email=e; save(); if(!state.pets.length) register(); else home()}
function register(editId){let p=editId?state.pets.find(x=>x.id===editId):{}; let hasCustom=p.photo&&p.photo!==photo; app.innerHTML=`${topbar(editId?'Editar pet':'Cadastrar pet',state.pets.length?'home()':'login()')}<div class="p"><div class="card"><label>Nome do pet</label><input id="name" value="${p.name||''}" placeholder="Ex: Thor"><label>Raça</label><input id="breed" value="${p.breed||''}" placeholder="Ex: Golden Retriever"><div class="grid g2"><div><label>Idade</label><input id="age" value="${p.age||''}" placeholder="Ex: 2 anos"></div><div><label>Peso kg</label><input id="weight" value="${p.weight||''}" placeholder="Ex: 12"></div></div><label>Porte</label><select id="size"><option ${p.size==='Pequeno'?'selected':''}>Pequeno</option><option ${!p.size||p.size==='Médio'?'selected':''}>Médio</option><option ${p.size==='Grande'?'selected':''}>Grande</option></select><label>Observações / alergias</label><textarea id="obs" placeholder="Ex: alergia a frango">${p.obs||''}</textarea><label>Foto do pet (opcional)</label><input id="petPhotoFile" type="file" accept="image/*" onchange="prevPetPhoto(event)"><input type="hidden" id="petPhotoData" value="${hasCustom?p.photo:''}"><div id="petPhotoPrev" style="margin-top:10px">${hasCustom?`<img src="${p.photo}" style="width:100%;max-height:220px;object-fit:cover;border-radius:14px"><br><button class="btn secondary" style="margin-top:8px" onclick="clearPetPhoto()">Remover foto</button>`:''}</div><br><br><button class="btn" onclick="savePet('${editId||''}')">Salvar pet</button></div></div>`}
function savePet(editId){
  let name=$('#name').value.trim();
  if(!name)return alert('Digite o nome do pet');
  let custom=$('#petPhotoData').value;
  let obj={id:editId||id(),name,breed:$('#breed').value,age:$('#age').value,weight:$('#weight').value,size:$('#size').value,obs:$('#obs').value,photo:custom||photo};
  try{
    if(editId){state.pets=state.pets.map(p=>p.id===editId?obj:p)}
    else{state.pets.push(obj);state.active=obj.id}
    save();
    home();
  }catch(err){
    alert('Espaço cheio no celular para salvar a foto. Tente uma foto menor ou remova alguma.');
  }
}
function home(){if(!state.email)return login(); if(!state.pets.length)return register(); let p=pet(); let next=[...state.vaccines.filter(v=>v.petId===p.id&&v.next)].sort((a,b)=>days(a.next)-days(b.next))[0]; let rem=[...state.reminders.filter(r=>r.petId===p.id&&!r.ok)].sort((a,b)=>days(a.date)-days(b.date))[0]; let nextG=[...state.grooming.filter(g=>g.petId===p.id&&g.next)].sort((a,b)=>days(a.next)-days(b.next))[0]; app.innerHTML=`<div class="p"><div style="display:flex;align-items:center;justify-content:space-between"> <div style="display:flex;gap:10px;align-items:center">${logo()}<div class="brand">PetCare<span>+</span></div></div><button class="back" onclick="settings()">⚙️</button></div><br><div class="grad"><div style="display:flex;gap:14px;align-items:center"><img class="avatar" src="${p.photo}"><div><div style="opacity:.8;font-size:12px;font-weight:800">MEU PET</div><div style="font-size:28px;font-weight:900">${p.name}</div><div>${p.breed||'Pet'} • ${p.age||'idade não informada'}</div></div></div><div class="grid g3" style="margin-top:18px"><div><small>Peso</small><b><br>${p.weight||'—'} kg</b></div><div><small>Vacinas</small><b><br>${state.vaccines.filter(v=>v.petId===p.id).length}</b></div><div><small>Banhos</small><b><br>${state.grooming.filter(g=>g.petId===p.id).length}</b></div></div></div><br>${next?`<div class="row" onclick="vaccines()"><span class="icon">💉</span><div><b>Próxima vacina: ${next.name}</b><div class="small">${days(next.next)<0?'Atrasada há '+Math.abs(days(next.next))+' dias':days(next.next)===0?'É hoje!':'Em '+days(next.next)+' dias'} • ${fmt(next.next)}</div></div></div>`:'<div class="alert">✅ Vacinas sem pendências registradas</div>'}<br>${nextG?`<div class="row" onclick="grooming()"><span class="icon">🛁</span><div><b>Próximo banho/tosa</b><div class="small">${days(nextG.next)<0?'Atrasado há '+Math.abs(days(nextG.next))+' dias':days(nextG.next)===0?'É hoje!':'Em '+days(nextG.next)+' dias'} • ${fmt(nextG.next)}</div></div></div><br>`:''}${rem?`<div class="row" onclick="reminders()"><span class="icon">🔔</span><div><b>${rem.title}</b><div class="small">${fmt(rem.date)}</div></div></div>`:''}<h3>Acesso rápido</h3><div class="grid g4"><button class="btn secondary" onclick="vaccines()">💉<br>Vacinas</button><button class="btn secondary" onclick="grooming()">🛁<br>Banho</button><button class="btn secondary" onclick="food()">🍽️<br>Comida</button><button class="btn secondary" onclick="reminders()">🔔<br>Lembretes</button></div></div>${nav('home')}`}
function vaccines(){let p=pet(); let list=state.vaccines.filter(v=>v.petId===p.id).map(v=>`<div class="row"><span class="icon">💉</span><div style="flex:1"><b>${v.name}</b><div class="small">Aplicada: ${fmt(v.date)} | Próxima: ${fmt(v.next)}</div></div><button onclick="delVac('${v.id}')">🗑️</button></div>`).join('')||`<div class="empty">Nenhuma vacina cadastrada.</div>`; app.innerHTML=`${topbar('Vacinação')}<div class="p"><button class="btn" onclick="vacForm()">+ Adicionar vacina</button><br><br><div class="list">${list}</div></div>${nav('vac')}`}
function vacForm(){let p=pet(); app.innerHTML=`${topbar('Adicionar vacina','vaccines()')}<div class="p"><div class="card"><label>Nome</label><input id="vn" placeholder="Ex: V10 / Antirrábica"><label>Aplicada em</label><input id="vd" type="date" value="${new Date().toISOString().slice(0,10)}"><label>Próxima dose</label><input id="vx" type="date"><br><br><button class="btn" onclick="saveVac()">Salvar vacina</button></div></div>`}
function saveVac(){let p=pet(), name=$('#vn').value.trim(); if(!name)return alert('Digite o nome'); state.vaccines.push({id:id(),petId:p.id,name,date:$('#vd').value,next:$('#vx').value}); save(); vaccines()}
function delVac(i){state.vaccines=state.vaccines.filter(v=>v.id!==i);save();vaccines()}
function reminders(){let p=pet(); let list=state.reminders.filter(r=>r.petId===p.id).map(r=>`<div class="row"><span class="icon">🔔</span><div style="flex:1"><b>${r.title}</b><div class="small">${fmt(r.date)}</div></div><button onclick="delRem('${r.id}')">🗑️</button></div>`).join('')||`<div class="empty">Nenhum lembrete cadastrado.</div>`; app.innerHTML=`${topbar('Lembretes')}<div class="p"><button class="btn orange" onclick="remForm()">+ Novo lembrete</button><br><br><div class="list">${list}</div></div>${nav('rem')}`}
function remForm(){app.innerHTML=`${topbar('Novo lembrete','reminders()')}<div class="p"><div class="card"><label>Título</label><input id="rt" placeholder="Ex: Dar vermífugo"><label>Data</label><input id="rd" type="date" value="${new Date().toISOString().slice(0,10)}"><br><br><button class="btn" onclick="saveRem()">Salvar lembrete</button></div></div>`}
function saveRem(){let p=pet(), title=$('#rt').value.trim(); if(!title)return alert('Digite o título'); state.reminders.push({id:id(),petId:p.id,title,date:$('#rd').value,ok:false}); save(); reminders()}
function delRem(i){state.reminders=state.reminders.filter(r=>r.id!==i);save();reminders()}
function food(){app.innerHTML=`${topbar('Alimentação')}<div class="p"><div class="grad" style="background:linear-gradient(135deg,#10b981,#059669)"><b>Recomendado para ${pet().name}</b><p>${pet().size==='Pequeno'?'Porte pequeno: refeições menores e controladas.':pet().size==='Grande'?'Porte grande: refeições maiores e balanceadas.':'Porte médio: porções moderadas e balanceadas.'}</p></div><h3>Pode comer</h3><div class="grid g2"><div class="card">🥕 <b>Cenoura</b><p class="small">Crua ou cozida, sem tempero.</p></div><div class="card">🍗 <b>Frango cozido</b><p class="small">Sem sal e sem temperos.</p></div><div class="card">🍎 <b>Maçã</b><p class="small">Sem sementes.</p></div><div class="card">🍠 <b>Batata-doce</b><p class="small">Cozida e sem tempero.</p></div></div><h3>Não pode</h3><div class="grid g2"><div class="card">🍫 <b>Chocolate</b><p class="small danger">Tóxico para cães.</p></div><div class="card">🍇 <b>Uva/passas</b><p class="small danger">Risco renal.</p></div><div class="card">🧅 <b>Cebola/alho</b><p class="small danger">Pode causar anemia.</p></div><div class="card">🦴 <b>Ossos cozidos</b><p class="small danger">Podem perfurar.</p></div></div></div>${nav('food')}`}

/* ============ BANHO / TOSA ============ */
function grooming(){
  if(!state.email)return login();
  if(!state.pets.length)return register();
  let p=pet();
  let recs=state.grooming.filter(g=>g.petId===p.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  let last=recs[0];
  let next=[...state.grooming.filter(g=>g.petId===p.id&&g.next)].sort((a,b)=>new Date(a.next)-new Date(b.next))[0];
  let nd=next?days(next.next):null;
  let now=new Date();
  let ms=new Date(now.getFullYear(),now.getMonth(),1);
  let monthSpent=state.grooming.filter(g=>g.petId===p.id&&g.date&&new Date(g.date+'T00:00:00')>=ms).reduce((s,g)=>s+(parseFloat(g.price)||0),0);
  let warn='';
  if(next){
    if(nd<0)warn=`<div class="alert danger">⚠️ Cuidado atrasado. Atualize a rotina do seu pet.</div>`;
    else if(nd<=3)warn=`<div class="alert warn">🔔 Está chegando o dia do próximo cuidado.</div>`;
  }
  let nextCard=next?`<div class="grad" style="background:linear-gradient(135deg,#8b5cf6,#6366f1)"><div style="opacity:.85;font-size:12px;font-weight:800">PRÓXIMO BANHO/TOSA</div><div style="font-size:24px;font-weight:900;margin-top:4px">${fmt(next.next)}</div><div style="margin-top:6px">${nd<0?'Atrasado há '+Math.abs(nd)+' dia'+(Math.abs(nd)>1?'s':''):nd===0?'É hoje!':'Em '+nd+' dia'+(nd>1?'s':'')}</div></div>`:'';
  let summary=`<div class="grid g2"><div class="statCard"><div class="small">Total de registros</div><b>${recs.length}</b></div><div class="statCard"><div class="small">Último banho/tosa</div><b style="font-size:14px">${last?fmt(last.date):'—'}</b></div><div class="statCard"><div class="small">Próximo cuidado</div><b style="font-size:14px">${next?fmt(next.next):'—'}</b></div><div class="statCard"><div class="small">Gasto no mês</div><b>${money(monthSpent)}</b></div></div>`;
  let history=recs.map(g=>`<div class="card" style="padding:14px"><div style="display:flex;gap:12px;align-items:flex-start">${g.photo?`<img src="${g.photo}" style="width:62px;height:62px;border-radius:18px;object-fit:cover;flex-shrink:0">`:`<div class="gIcon">🛁</div>`}<div style="flex:1;min-width:0"><b>${g.type||'Banho'}</b><div class="small">${fmt(g.date)} • ${g.location||'—'}${g.place?' • '+g.place:''}</div>${g.price&&parseFloat(g.price)>0?`<div class="small" style="margin-top:2px"><b>${money(g.price)}</b></div>`:''}${g.next?`<div class="small" style="margin-top:2px">📅 Próximo: ${fmt(g.next)}</div>`:''}${g.obs?`<div class="small" style="margin-top:4px">${g.obs}</div>`:''}</div></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn secondary" style="padding:10px;font-size:13px;flex:1" onclick="groomingForm('${g.id}')">✏️ Editar</button><button class="btn secondary" style="padding:10px;font-size:13px;flex:1;color:#dc2626" onclick="delGrooming('${g.id}')">🗑️ Excluir</button></div></div>`).join('')||`<div class="empty">Nenhum registro de banho/tosa ainda.<br>Toque em <b>Novo registro</b> para começar.</div>`;
  app.innerHTML=`${topbar('Banho / Tosa')}<div class="p"><button class="btn purple" onclick="groomingForm()">+ Novo registro</button>${warn?'<br><br>'+warn:''}${nextCard?'<br><br>'+nextCard:''}<br><br>${summary}<h3>Histórico</h3><div class="list">${history}</div></div>${nav('groom')}`;
}

function groomingForm(editId){
  let g=editId?state.grooming.find(x=>x.id===editId):{};
  let types=['Banho','Tosa','Banho + Tosa','Higiene','Corte de unhas','Limpeza de ouvido'];
  let locs=['Em casa','Petshop','Veterinário','Outro'];
  app.innerHTML=`${topbar(editId?'Editar registro':'Novo registro','grooming()')}<div class="p"><div class="card"><label>Tipo</label><select id="gtype">${types.map(t=>`<option ${g.type===t?'selected':''}>${t}</option>`).join('')}</select><label>Data realizada</label><input id="gdate" type="date" value="${g.date||new Date().toISOString().slice(0,10)}"><label>Local</label><select id="gloc">${locs.map(l=>`<option ${g.location===l?'selected':''}>${l}</option>`).join('')}</select><label>Nome do local / profissional</label><input id="gplace" value="${(g.place||'').replace(/"/g,'&quot;')}" placeholder="Ex: Petshop Patinhas"><label>Valor pago (R$)</label><input id="gprice" type="number" step="0.01" min="0" value="${g.price||''}" placeholder="Ex: 80.00"><label>Observação</label><textarea id="gobs" placeholder="Ex: pet ficou tranquilo">${g.obs||''}</textarea><label>Próxima data recomendada</label><input id="gnext" type="date" value="${g.next||''}"><label>Foto após banho/tosa (opcional)</label><input id="gphoto" type="file" accept="image/*" onchange="prevPhoto(event)"><input type="hidden" id="gphotoData" value="${g.photo||''}"><div id="photoPrev" style="margin-top:10px">${g.photo?`<img src="${g.photo}" style="width:100%;max-height:220px;object-fit:cover;border-radius:14px"><br><button class="btn secondary" style="margin-top:8px" onclick="clearPhoto()">Remover foto</button>`:''}</div><br><br><button class="btn purple" onclick="saveGrooming('${editId||''}')">Salvar registro</button></div></div>`;
}

/* ============ UPLOAD DE FOTOS (compartilhado) ============ */
function compressImage(file, cb){
  if(!file)return;
  if(file.size>15*1024*1024){alert('Foto muito grande. Use uma menor que 15MB.');return}
  let reader=new FileReader();
  reader.onload=ev=>{
    let img=new Image();
    img.onload=()=>{
      let max=900,w=img.width,h=img.height;
      if(w>h&&w>max){h=h*max/w;w=max}
      else if(h>max){w=w*max/h;h=max}
      let cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.78));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function prevPhoto(e){
  compressImage(e.target.files[0], data => {
    $('#gphotoData').value=data;
    $('#photoPrev').innerHTML=`<img src="${data}" style="width:100%;max-height:220px;object-fit:cover;border-radius:14px"><br><button class="btn secondary" style="margin-top:8px" onclick="clearPhoto()">Remover foto</button>`;
  });
}

function clearPhoto(){
  $('#gphotoData').value='';
  let f=$('#gphoto');if(f)f.value='';
  $('#photoPrev').innerHTML='';
}

function prevPetPhoto(e){
  compressImage(e.target.files[0], data => {
    $('#petPhotoData').value=data;
    $('#petPhotoPrev').innerHTML=`<img src="${data}" style="width:100%;max-height:220px;object-fit:cover;border-radius:14px"><br><button class="btn secondary" style="margin-top:8px" onclick="clearPetPhoto()">Remover foto</button>`;
  });
}

function clearPetPhoto(){
  $('#petPhotoData').value='';
  let f=$('#petPhotoFile');if(f)f.value='';
  $('#petPhotoPrev').innerHTML='';
}

function saveGrooming(editId){
  let p=pet();
  if(!$('#gdate').value)return alert('Informe a data realizada');
  let obj={id:editId||id(),petId:p.id,type:$('#gtype').value,date:$('#gdate').value,location:$('#gloc').value,place:$('#gplace').value.trim(),price:$('#gprice').value,obs:$('#gobs').value.trim(),next:$('#gnext').value,photo:$('#gphotoData').value};
  try{
    if(editId)state.grooming=state.grooming.map(x=>x.id===editId?obj:x);
    else state.grooming.push(obj);
    save();
    grooming();
  }catch(err){
    alert('Espaço cheio no celular para salvar a foto. Tente uma foto menor ou remova alguma.');
  }
}

function delGrooming(i){
  if(!confirm('Excluir este registro?'))return;
  state.grooming=state.grooming.filter(g=>g.id!==i);
  save();
  grooming();
}
/* ============ FIM BANHO / TOSA ============ */

/* ============ BACKUP / RESTORE ============ */
function exportBackup(){
  try{
    let payload={...state, _exportedAt:new Date().toISOString(), _appVersion:'petcare_plus_v1'};
    let data=JSON.stringify(payload,null,2);
    let blob=new Blob([data],{type:'application/json'});
    let url=URL.createObjectURL(blob);
    let a=document.createElement('a');
    a.href=url;
    a.download=`petcare-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),200);
  }catch(err){
    alert('Não foi possível gerar o backup.');
  }
}

function triggerImport(){let f=$('#importFile');if(f)f.click()}

function importBackup(e){
  let file=e.target.files[0];
  if(!file)return;
  let reader=new FileReader();
  reader.onload=ev=>{
    try{
      let imp=JSON.parse(ev.target.result);
      if(typeof imp!=='object'||imp===null||!Array.isArray(imp.pets)){
        alert('Arquivo inválido. Selecione um backup PetCare+.');
        e.target.value='';
        return;
      }
      let resumo=`Restaurar este backup?\n\n${imp.pets.length} pet(s)\n${(imp.vaccines||[]).length} vacina(s)\n${(imp.grooming||[]).length} banho(s)/tosa(s)\n${(imp.reminders||[]).length} lembrete(s)\n\nOs dados atuais serão substituídos.`;
      if(!confirm(resumo)){e.target.value='';return}
      let pets=imp.pets||[];
      let active=imp.active;
      if(!pets.find(p=>p.id===active))active=pets[0]?pets[0].id:null;
      let novo={
        email:imp.email||state.email,
        plan:imp.plan||'basic',
        pets,
        active,
        vaccines:Array.isArray(imp.vaccines)?imp.vaccines:[],
        reminders:Array.isArray(imp.reminders)?imp.reminders:[],
        grooming:Array.isArray(imp.grooming)?imp.grooming:[]
      };
      let backup=JSON.stringify(state);
      state=novo;
      try{
        save();
        e.target.value='';
        alert('✅ Backup restaurado com sucesso!');
        if(state.email&&state.pets.length)home();
        else if(state.email)register();
        else login();
      }catch(quotaErr){
        state=JSON.parse(backup);
        alert('Espaço cheio no celular para salvar este backup. Tente em um aparelho com mais espaço.');
        e.target.value='';
      }
    }catch(err){
      alert('Erro ao ler o arquivo. Verifique se é um backup PetCare+ válido.');
      e.target.value='';
    }
  };
  reader.readAsText(file);
}
/* ============ FIM BACKUP / RESTORE ============ */

function logout(){if(confirm('Sair do app?')){state.email='';save();login()}}
function install(){app.innerHTML=`${topbar('Instalar aplicativo',state.email?'settings()':'login()')}<div class="p install"><div class="card"><h2>Android</h2><ol><li>Abra este site no Chrome.</li><li>Toque nos 3 pontinhos.</li><li>Toque em “Adicionar à tela inicial”.</li><li>Confirme em “Instalar”.</li></ol></div><br><div class="card"><h2>iPhone</h2><ol><li>Abra este site no Safari.</li><li>Toque no botão de compartilhar.</li><li>Escolha “Adicionar à Tela de Início”.</li><li>Confirme em “Adicionar”.</li></ol></div><br><button class="btn" onclick="${state.email?'home()':'login()'}">Continuar</button></div>`}
login(); if(state.email){ if(state.pets.length) home(); else register(); }

  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})});
